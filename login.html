<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — SGA Fiocruz/MG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

  <div class="ledger-bg" aria-hidden="true"></div>

  <div class="login-card">
    <div class="rivet rivet-tl"></div>
    <div class="rivet rivet-tr"></div>

    <p class="eyebrow" style="text-align:center;">Fiocruz Minas· ARCE</p>
    <h1 class="login-title">Sistema de Gestão<br>Arquivística</h1>
    <p class="login-sub">Departamento de Arquivo e Documentação</p>

    <form id="loginForm">
      <div class="field">
        <label>Matrícula ou usuário</label>
        <input type="text" id="usuario" placeholder="ex: arce.fiocruz" required autocomplete="username">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="senha" placeholder="••••••••" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn primary login-submit" id="btnEntrar">
        <span>Acessar sistema</span>
      </button>
    </form>

    <!-- Tela de primeiro acesso: aparece quando o usuário existe na planilha
         mas ainda não tem senha cadastrada -->
    <form id="primeiroAcessoForm" style="display:none;">
      <p class="login-sub" style="margin-bottom:16px; text-align:left;">
        Primeiro acesso identificado para <strong id="paUsuarioLabel"></strong>. Crie sua senha para continuar.
      </p>
      <div class="field">
        <label>Nova senha</label>
        <input type="password" id="paNovaSenha" placeholder="mínimo 6 caracteres" required autocomplete="new-password" minlength="6">
      </div>
      <div class="field">
        <label>Confirmar senha</label>
        <input type="password" id="paConfirmarSenha" placeholder="repita a senha" required autocomplete="new-password" minlength="6">
      </div>

      <button type="submit" class="btn primary login-submit" id="btnDefinirSenha">
        <span>Criar senha e entrar</span>
      </button>
      <button type="button" class="btn ghost login-submit" id="btnVoltarLogin" style="margin-top:8px;">
        <span>Voltar</span>
      </button>
    </form>

    <div id="errorMsg" class="error-msg"></div>

    <!-- selo que "carimba" a tela ao autenticar com sucesso -->
    <div class="stamp-seal" id="stampSeal" aria-hidden="true">
      <div class="stamp-seal-ring">
        <span>ACESSO</span>
        <span class="stamp-seal-center">✓</span>
        <span>CONCEDIDO</span>
      </div>
    </div>
  </div>

  <p class="login-footnote">Arquivo Central · uso interno Fiocruz Minas</p>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
